  - IRN-ENTRY-05
  - IRN-ENTRY-06
  - IRN-ENTRY-07
  - IRN-ENTRY-08
- name: 🇮🇷 AUTO-IRN-ENTRY
  type: url-test
  url: https://www.gstatic.com/generate_204
