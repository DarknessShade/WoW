  - IRN-ENTRY-04
  - IRN-ENTRY-05
  - IRN-ENTRY-06
  - IRN-ENTRY-07
  - IRN-ENTRY-08
- name: 🇮🇷 AUTO-IRN-ENTRY
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 180
  tolerance: 50
  timeout: 5000
  max-failed-times: 3
  proxies:
  - IRN-ENTRY-01
  - IRN-ENTRY-02
  - IRN-ENTRY-03
  - IRN-ENTRY-04
  - IRN-ENTRY-05
  - IRN-ENTRY-06
  - IRN-ENTRY-07
  - IRN-ENTRY-08
