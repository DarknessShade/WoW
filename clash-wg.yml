  interval: 180
  tolerance: 50
  timeout: 5000
  max-failed-times: 3
  proxies:
  - GER-DIALER-01
  - GER-DIALER-02
  - GER-DIALER-03
  - GER-DIALER-04
  - GER-DIALER-05
  - GER-DIALER-06
  - GER-DIALER-07
