- name: 🔰 PROXIES
  type: select
  proxies:
  - 🇮🇷 AUTO-IRN-ENTRY
  - 🇩🇪 AUTO-GER-DIALER
  - DIRECT
  - GER-DIALER-01
  - GER-DIALER-02
